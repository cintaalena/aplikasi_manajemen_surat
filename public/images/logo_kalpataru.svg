<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!--
    Kalpataru Award Trophy — 2D logo recreation
    Upper half (green): 17 thin ribbon branches fanning upward, clipped to circle
    Lower half (brown): 9 thin ribbon roots fanning downward
    Horizontal waist bar connects both halves
    Clip circle radius 96 keeps it circular
  -->
  <defs>
    <clipPath id="kc">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <!-- ══ GREEN CANOPY — 17 ribbon branches, trunk top at (100,96) ══ -->
  <!-- Branch template (upward): M -5 0 C -8 -L*0.3 -6 -L*0.65 0 -L C 6 -L*0.65 8 -L*0.3 5 0 Z -->
  <g fill="#2E7D32" clip-path="url(#kc)">

    <g transform="translate(100,96) rotate(-80)">
      <path d="M -5 0 C -8 -12.6 -6 -27.3 0 -42 C 6 -27.3 8 -12.6 5 0 Z"/>
    </g>
    <g transform="translate(100,96) rotate(-70)">
      <path d="M -5 0 C -8 -17.4 -6 -37.7 0 -58 C 6 -37.7 8 -17.4 5 0 Z"/>
    </g>
    <g transform="translate(100,96) rotate(-60)">
      <path d="M -5 0 C -8 -21.6 -6 -46.8 0 -72 C 6 -46.8 8 -21.6 5 0 Z"/>
    </g>
    <g transform="translate(100,96) rotate(-50)">
      <path d="M -5 0 C -8 -24 -6 -52 0 -80 C 6 -52 8 -24 5 0 Z"/>
    </g>
    <g transform="translate(100,96) rotate(-40)">
      <path d="M -5 0 C -8 -25.5 -6 -55.3 0 -85 C 6 -55.3 8 -25.5 5 0 Z"/>
    </g>
    <g transform="translate(100,96) rotate(-30)">
      <path d="M -5 0 C -8 -26.4 -6 -57.2 0 -88 C 6 -57.2 8 -26.4 5 0 Z"/>
    </g>
    <g transform="translate(100,96) rotate(-20)">
      <path d="M -5 0 C -8 -27 -6 -58.5 0 -90 C 6 -58.5 8 -27 5 0 Z"/>
    </g>
    <g transform="translate(100,96) rotate(-10)">
      <path d="M -5 0 C -8 -27.6 -6 -59.8 0 -92 C 6 -59.8 8 -27.6 5 0 Z"/>
    </g>
    <g transform="translate(100,96) rotate(0)">
      <path d="M -5 0 C -8 -27.6 -6 -59.8 0 -92 C 6 -59.8 8 -27.6 5 0 Z"/>
    </g>
    <g transform="translate(100,96) rotate(10)">
      <path d="M -5 0 C -8 -27.6 -6 -59.8 0 -92 C 6 -59.8 8 -27.6 5 0 Z"/>
    </g>
    <g transform="translate(100,96) rotate(20)">
      <path d="M -5 0 C -8 -27 -6 -58.5 0 -90 C 6 -58.5 8 -27 5 0 Z"/>
    </g>
    <g transform="translate(100,96) rotate(30)">
      <path d="M -5 0 C -8 -26.4 -6 -57.2 0 -88 C 6 -57.2 8 -26.4 5 0 Z"/>
    </g>
    <g transform="translate(100,96) rotate(40)">
      <path d="M -5 0 C -8 -25.5 -6 -55.3 0 -85 C 6 -55.3 8 -25.5 5 0 Z"/>
    </g>
    <g transform="translate(100,96) rotate(50)">
      <path d="M -5 0 C -8 -24 -6 -52 0 -80 C 6 -52 8 -24 5 0 Z"/>
    </g>
    <g transform="translate(100,96) rotate(60)">
      <path d="M -5 0 C -8 -21.6 -6 -46.8 0 -72 C 6 -46.8 8 -21.6 5 0 Z"/>
    </g>
    <g transform="translate(100,96) rotate(70)">
      <path d="M -5 0 C -8 -17.4 -6 -37.7 0 -58 C 6 -37.7 8 -17.4 5 0 Z"/>
    </g>
    <g transform="translate(100,96) rotate(80)">
      <path d="M -5 0 C -8 -12.6 -6 -27.3 0 -42 C 6 -27.3 8 -12.6 5 0 Z"/>
    </g>

    <!-- Canopy base fill (fills gaps where branches meet trunk) -->
    <ellipse cx="100" cy="96" rx="18" ry="8"/>
  </g>

  <!-- ══ BROWN ROOTS — 9 ribbon roots, trunk bottom at (100,104) ══ -->
  <!-- Root template (downward): M -5 0 C -8 L*0.3 -6 L*0.65 0 L C 6 L*0.65 8 L*0.3 5 0 Z -->
  <!-- NOTE: rotate(+angle) on downward path → lower-LEFT; rotate(-angle) → lower-RIGHT -->
  <g fill="#6D4C41" clip-path="url(#kc)">

    <g transform="translate(100,104) rotate(64)">
      <path d="M -5 0 C -8 14.4 -6 31.2 0 48 C 6 31.2 8 14.4 5 0 Z"/>
    </g>
    <g transform="translate(100,104) rotate(48)">
      <path d="M -5 0 C -8 18.6 -6 40.3 0 62 C 6 40.3 8 18.6 5 0 Z"/>
    </g>
    <g transform="translate(100,104) rotate(32)">
      <path d="M -5 0 C -8 22.2 -6 48.1 0 74 C 6 48.1 8 22.2 5 0 Z"/>
    </g>
    <g transform="translate(100,104) rotate(16)">
      <path d="M -5 0 C -8 24.6 -6 53.3 0 82 C 6 53.3 8 24.6 5 0 Z"/>
    </g>
    <g transform="translate(100,104) rotate(0)">
      <path d="M -5 0 C -8 25.5 -6 55.3 0 85 C 6 55.3 8 25.5 5 0 Z"/>
    </g>
    <g transform="translate(100,104) rotate(-16)">
      <path d="M -5 0 C -8 24.6 -6 53.3 0 82 C 6 53.3 8 24.6 5 0 Z"/>
    </g>
    <g transform="translate(100,104) rotate(-32)">
      <path d="M -5 0 C -8 22.2 -6 48.1 0 74 C 6 48.1 8 22.2 5 0 Z"/>
    </g>
    <g transform="translate(100,104) rotate(-48)">
      <path d="M -5 0 C -8 18.6 -6 40.3 0 62 C 6 40.3 8 18.6 5 0 Z"/>
    </g>
    <g transform="translate(100,104) rotate(-64)">
      <path d="M -5 0 C -8 14.4 -6 31.2 0 48 C 6 31.2 8 14.4 5 0 Z"/>
    </g>

    <!-- Root base fill -->
    <ellipse cx="100" cy="104" rx="18" ry="8"/>
  </g>

  <!-- ══ HORIZONTAL WAIST BAR (characteristic Kalpataru element) ══ -->
  <rect x="14" y="95" width="172" height="10" rx="5" fill="#4E342E" clip-path="url(#kc)"/>
</svg>
  <!--
    Kalpataru Award Tree Logo
    Green canopy (top): 9 organic branch-fingers radiating upward from trunk
    Brown roots (bottom): mirror of the branches radiating downward
    Clipped to a circle for the characteristic circular badge shape
  -->
  <defs>
    <clipPath id="kc">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <!-- ── GREEN CANOPY ── -->
  <g clip-path="url(#kc)" fill="#2E7D32">
    <!-- origin = top of trunk, at (100, 95) -->
    <g transform="translate(100,95)">

      <!-- branch shape = wide-bellied leaf pointing upward in local space -->
      <!-- rotate() pivots each branch around the trunk top -->

      <!-- far-left branch ~-80° -->
      <g transform="rotate(-80)">
        <path d="M-6,2 C-14,-16 -16,-46 -9,-80 C-4,-92 4,-92 9,-80 C16,-46 14,-16 6,2 Z"/>
      </g>
      <!-- left branch ~-60° -->
      <g transform="rotate(-60)">
        <path d="M-7,2 C-16,-20 -19,-54 -11,-90 C-5,-104 5,-104 11,-90 C19,-54 16,-20 7,2 Z"/>
      </g>
      <!-- left-centre branch ~-38° -->
      <g transform="rotate(-38)">
        <path d="M-8,2 C-17,-22 -20,-58 -12,-96 C-6,-110 6,-110 12,-96 C20,-58 17,-22 8,2 Z"/>
      </g>
      <!-- slight-left branch ~-18° -->
      <g transform="rotate(-18)">
        <path d="M-9,2 C-18,-22 -21,-60 -12,-98 C-6,-112 6,-112 12,-98 C21,-60 18,-22 9,2 Z"/>
      </g>
      <!-- centre branch 0° -->
      <g transform="rotate(0)">
        <path d="M-9,2 C-18,-22 -21,-60 -12,-98 C-6,-112 6,-112 12,-98 C21,-60 18,-22 9,2 Z"/>
      </g>
      <!-- slight-right branch ~18° -->
      <g transform="rotate(18)">
        <path d="M-9,2 C-18,-22 -21,-60 -12,-98 C-6,-112 6,-112 12,-98 C21,-60 18,-22 9,2 Z"/>
      </g>
      <!-- right-centre branch ~38° -->
      <g transform="rotate(38)">
        <path d="M-8,2 C-17,-22 -20,-58 -12,-96 C-6,-110 6,-110 12,-96 C20,-58 17,-22 8,2 Z"/>
      </g>
      <!-- right branch ~60° -->
      <g transform="rotate(60)">
        <path d="M-7,2 C-16,-20 -19,-54 -11,-90 C-5,-104 5,-104 11,-90 C19,-54 16,-20 7,2 Z"/>
      </g>
      <!-- far-right branch ~80° -->
      <g transform="rotate(80)">
        <path d="M-6,2 C-14,-16 -16,-46 -9,-80 C-4,-92 4,-92 9,-80 C16,-46 14,-16 6,2 Z"/>
      </g>

      <!-- trunk cap -->
      <rect x="-9" y="-16" width="18" height="20" rx="6"/>
    </g>
  </g>

  <!-- ── BROWN ROOTS ── -->
  <g clip-path="url(#kc)" fill="#6D4C41">
    <!-- origin = bottom of trunk, at (100, 107) -->
    <g transform="translate(100,107)">

      <!-- mirror: paths go downward (positive y) -->

      <!-- far-left root ~-80° -->
      <g transform="rotate(-80)">
        <path d="M-6,-2 C-14,16 -16,46 -9,80 C-4,92 4,92 9,80 C16,46 14,16 6,-2 Z"/>
      </g>
      <!-- left root ~-60° -->
      <g transform="rotate(-60)">
        <path d="M-7,-2 C-16,20 -19,54 -11,90 C-5,104 5,104 11,90 C19,54 16,20 7,-2 Z"/>
      </g>
      <!-- left-centre root ~-38° -->
      <g transform="rotate(-38)">
        <path d="M-8,-2 C-17,22 -20,58 -12,96 C-6,110 6,110 12,96 C20,58 17,22 8,-2 Z"/>
      </g>
      <!-- slight-left root ~-18° -->
      <g transform="rotate(-18)">
        <path d="M-9,-2 C-18,22 -21,60 -12,98 C-6,112 6,112 12,98 C21,60 18,22 9,-2 Z"/>
      </g>
      <!-- centre root 0° -->
      <g transform="rotate(0)">
        <path d="M-9,-2 C-18,22 -21,60 -12,98 C-6,112 6,112 12,98 C21,60 18,22 9,-2 Z"/>
      </g>
      <!-- slight-right root ~18° -->
      <g transform="rotate(18)">
        <path d="M-9,-2 C-18,22 -21,60 -12,98 C-6,112 6,112 12,98 C21,60 18,22 9,-2 Z"/>
      </g>
      <!-- right-centre root ~38° -->
      <g transform="rotate(38)">
        <path d="M-8,-2 C-17,22 -20,58 -12,96 C-6,110 6,110 12,96 C20,58 17,22 8,-2 Z"/>
      </g>
      <!-- right root ~60° -->
      <g transform="rotate(60)">
        <path d="M-7,-2 C-16,20 -19,54 -11,90 C-5,104 5,104 11,90 C19,54 16,20 7,-2 Z"/>
      </g>
      <!-- far-right root ~80° -->
      <g transform="rotate(80)">
        <path d="M-6,-2 C-14,16 -16,46 -9,80 C-4,92 4,92 9,80 C16,46 14,16 6,-2 Z"/>
      </g>

      <!-- trunk base -->
      <rect x="-9" y="-4" width="18" height="20" rx="6"/>
    </g>
  </g>
</svg>
